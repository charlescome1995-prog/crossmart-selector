<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart - Product Selector (4-Bucket SOP)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Times New Roman",Times,"PingFang SC","Microsoft YaHei",serif;background:#eaeded;color:#0f1111;font-size:14px;min-height:100vh}

/* Topbar */
.topbar{background:linear-gradient(135deg,#131921 0%,#232f3e 100%);color:white;padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar .logo{font-weight:700;font-size:15px;letter-spacing:.5px}
.topbar a{color:#ccc;text-decoration:none;padding:5px 12px;border-radius:6px;font-size:13px;transition:all .2s}
.topbar a:hover{background:rgba(255,255,255,.1);color:#fff}
.topbar a.active{background:#e94560;color:white}

/* Meta strip */
.meta-strip{background:white;padding:8px 20px;border-bottom:1px solid #d5d9d9;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#555}
.meta-strip .stat strong{color:#0f1111}
.meta-strip .ts{color:#888}

/* Bucket summary cards */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 20px;background:linear-gradient(135deg,#fafafa,#f0f2f2);border-bottom:1px solid #e6e8ea}
.summary .card-stat{text-align:center;padding:8px 12px;background:white;border-radius:8px;border-left:4px solid #ddd;cursor:pointer;transition:transform .15s}
.summary .card-stat:hover{transform:translateY(-2px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.summary .card-stat[data-bucket="品牌创新"]{border-left-color:#2ecc71}
.summary .card-stat[data-bucket="newrelease"]{border-left-color:#f1c40f}
.summary .card-stat[data-bucket="模仿跟风"]{border-left-color:#e67e22}
.summary .card-stat[data-bucket="老款延伸"]{border-left-color:#9b59b6}
.summary .num{font-size:22px;font-weight:700;color:#0f1111}
.summary .lb{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Search */
.search-bar{padding:10px 20px;background:white;border-bottom:1px solid #e6e8ea;display:flex;gap:10px;align-items:center}
.search-bar input{flex:1;padding:7px 12px;border:1px solid #d5d9d9;border-radius:6px;font-size:13px}
.search-bar .hint{font-size:11px;color:#888}

/* Tabs */
.tabs{display:flex;gap:4px;padding:0 20px;background:#fafafa;border-bottom:2px solid #e6e8ea;position:sticky;top:48px;z-index:99}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{background:#f0f0f0}
.tab.active{color:#2c3e50;border-bottom-color:#3498db;font-weight:600}

/* Action template */
.action-template{background:#fffbf0;border:1px solid #ffe082;border-radius:6px;padding:10px 16px;margin:12px 20px;font-size:12px;display:none}
.action-template.show{display:block}
.action-template .pri{font-weight:600;color:#92400e;margin-bottom:6px}
.action-template ul{margin:4px 0;padding-left:20px}
.action-template li{margin:2px 0}
.action-template .meta-line{margin-top:4px;color:#666;font-size:11px}

/* Tables */
.bucket-panel{padding:0 20px 20px;display:none}
.bucket-panel.show{display:block}
table.data{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:12px;margin-top:8px}
table.data th{background:#fafafa;padding:9px 6px;text-align:left;border-bottom:2px solid #eee;cursor:pointer;user-select:none;font-weight:600;color:#444;white-space:nowrap;font-size:11px}
table.data th:hover{background:#f0f0f0}
table.data th::after{content:' ⇅';opacity:.3;font-size:9px}
table.data th.sort-asc::after{content:' ▲';opacity:1;color:#3498db}
table.data th.sort-desc::after{content:' ▼';opacity:1;color:#3498db}
table.data td{padding:7px 6px;border-bottom:1px solid #f0f0f0;font-size:12px}
table.data td.kw{font-family:ui-monospace,"Cascadia Code","Consolas",monospace;font-size:11px;font-weight:600;color:#007185}
table.data td.num{text-align:right;font-variant-numeric:tabular-nums}
table.data tr:hover{background:#f8fbff}
table.data td.empty{text-align:center;color:#999;padding:24px}

.tag-tier{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.tag-tier.green{background:#d1fae5;color:#065f46}
.tag-tier.yellow{background:#fef3c7;color:#92400e}
.tag-tier.red{background:#fee2e2;color:#991b1b}

.tag-legacy{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#f5f3ff;color:#5b21b6;border:1px solid #ddd6fe}
.tag-legacy.strong{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd;font-weight:600}
.tag-legacy.medium{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe}
.tag-legacy.none{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb}

footer{padding:16px 20px;color:#888;font-size:11px;text-align:center;border-top:1px solid #e6e8ea;background:#fafafa}
footer code{font-family:ui-monospace,monospace;font-size:10px;background:#f0f0f0;padding:1px 5px;border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">🎯 CrossMart Selector</span>
  <a href="selection.html" class="active">🎯 选品（4 桶 SOP）</a>
  <a href="https://charlescome1995-prog.github.io/crossmart-listing/listing.html" target="_top">📝 Listing</a>
  <a href="https://charlescome1995-prog.github.io/crossmart-monitor/monitor.html" target="_top">📊 Monitor</a>
  <a href="https://charlescome1995-prog.github.io/crossmart-ops/ops.html" target="_top">📈 Ops</a>
  <a href="https://charlescome1995-prog.github.io/crossmart-simulator/simulator.html" target="_top">🔮 Simulator</a>
</div>

<div class="meta-strip">
  <div class="stat">
    <strong id="totalCount">0</strong> 入桶 ·
    <span id="generatedAt">—</span> ·
    来源 <code>strategy.json</code>
  </div>
  <div class="ts">
    老品库 <strong id="legacyCount">0</strong> 个 ·
    <span id="legacyNames"></span>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="search-bar">
  <input id="searchInput" type="text" placeholder="🔍 搜索关键词或国家（例: butter / DE）...">
  <span class="hint">点列头排序 · 点 Tab 切桶 · 点卡片跳桶</span>
</div>

<div class="tabs" id="tabs"></div>

<div id="panels"></div>

<footer>
  数据: <code>data/strategy.json</code> ·
  SOP 脚本: <code>backend/selectors/{quick_filter,triage,strategy_router,render_html}.py</code> ·
  老品库: <code>backend/config/legacy_keywords.json</code> ·
  流程文档: <code>SOP.md</code>
</footer>

<script>
const BUCKET_ORDER = ["品牌创新", "newrelease", "模仿跟风", "老款延伸"];
const BUCKET_TIER = {"品牌创新":"🟢","newrelease":"🟡","模仿跟风":"🟡","老款延伸":"🟡"};

let _strategy = null;
let _activeBucket = "newrelease";  // 默认展示

function fmtNum(n, suffix='') {
  if (n === null || n === undefined || n === '' || isNaN(n)) return '-';
  return Number(n).toLocaleString() + suffix;
}

function domainFor(country) {
  return {UK:'amazon.co.uk', DE:'amazon.de', CA:'amazon.ca', US:'amazon.com'}[country] || 'amazon.com';
}

function legacyLabel(m) {
  if (!m) return '-';
  if (m.strength === 'strong') return `<span class="tag-legacy strong">🔥 ${m.legacy_kw}</span>`;
  if (m.strength === 'medium') return `<span class="tag-legacy medium">🟡 ${m.legacy_kw || m.legacy_category}</span>`;
  return '<span class="tag-legacy none">—</span>';
}

function tierTag(tier) {
  if (!tier) return '';
  const cls = tier === '🟢' ? 'green' : tier === '🟡' ? 'yellow' : 'red';
  return `<span class="tag-tier ${cls}">${tier}</span>`;
}

function renderSummary() {
  const wrap = document.getElementById('summary');
  wrap.innerHTML = BUCKET_ORDER.map(name => {
    const b = _strategy.buckets[name] || {};
    return `<div class="card-stat" data-bucket="${name}" onclick="switchBucket('${name}')">
      <div class="num">${b.count || 0}</div>
      <div class="lb">${BUCKET_TIER[name]} ${name}</div>
    </div>`;
  }).join('');
}

function renderTabs() {
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = BUCKET_ORDER.map(name => {
    const cnt = (_strategy.buckets[name] || {}).count || 0;
    const active = name === _activeBucket ? ' active' : '';
    return `<div class="tab${active}" data-bucket="${name}" onclick="switchBucket('${name}')">${BUCKET_TIER[name]} ${name} (${cnt})</div>`;
  }).join('');
}

function renderActionTemplate(name) {
  const items = (_strategy.buckets[name] || {}).items || [];
  if (!items.length) return '';
  const t = items[0].action_template || {};
  const actions = (t['核心动作'] || []).map(a => `<li>${a}</li>`).join('');
  return `<div class="action-template show" data-bucket="${name}">
    <div class="pri">📌 ${name} · ${t.priority || ''}</div>
    <ul>${actions}</ul>
    <div class="meta-line">⚠️ ${t['风险提示'] || ''}</div>
    <div class="meta-line">📈 预期 ROI: ${t['预期 ROI'] || ''}</div>
  </div>`;
}

function renderTable(name) {
  const items = (_strategy.buckets[name] || {}).items || [];
  if (!items.length) {
    return `<table class="data" data-bucket="${name}"><tbody><tr><td class="empty">（该桶暂无候选）</td></tr></tbody></table>`;
  }
  const rows = items.map(it => {
    const m = it.metrics || {};
    const legacy = legacyLabel(it.legacy_match);
    const tier = tierTag(it.tier_from_part_A);
    const kw = (it.keyword || '').replace(/</g, '&lt;');
    const c = it.country || '';
    const domain = domainFor(c);
    return `<tr data-kw="${kw.toLowerCase()}" data-country="${c.toLowerCase()}">
      <td>${c}</td>
      <td class="kw"><a href="https://${domain}/s?k=${encodeURIComponent(it.keyword||'')}" target="_blank" style="color:#007185;text-decoration:none">${kw} 🔍</a></td>
      <td>${tier}</td>
      <td class="num">${fmtNum(m['月购_calc'])}</td>
      <td class="num">${fmtNum(m['需供比'],'')}</td>
      <td class="num">${fmtNum(m['评分数'])}</td>
      <td class="num">${fmtNum(m['SPR'])}</td>
      <td class="num">${fmtNum(m['广告竞品数'])}</td>
      <td class="num">${m['价格'] ? '$' + Number(m['价格']).toFixed(2) : '-'}</td>
      <td class="num">${fmtNum(it.priority_score, '', 1)}</td>
      <td>${legacy}</td>
    </tr>`;
  }).join('');
  return `<table class="data" data-bucket="${name}">
    <thead><tr>
      <th data-col="country" data-type="str">国</th>
      <th data-col="keyword" data-type="str">关键词</th>
      <th data-col="tier" data-type="str">tier</th>
      <th data-col="yg" data-type="num">月购</th>
      <th data-col="xgb" data-type="num">需供</th>
      <th data-col="pfs" data-type="num">评分</th>
      <th data-col="spr" data-type="num">SPR</th>
      <th data-col="ad" data-type="num">广告竞品</th>
      <th data-col="price" data-type="num">价</th>
      <th data-col="score" data-type="num">score</th>
      <th data-col="legacy" data-type="str">前置老品</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderPanels() {
  const wrap = document.getElementById('panels');
  wrap.innerHTML = BUCKET_ORDER.map(name => {
    const show = name === _activeBucket ? ' show' : '';
    return `<div class="bucket-panel${show}" data-bucket="${name}">
      ${renderActionTemplate(name)}
      ${renderTable(name)}
    </div>`;
  }).join('');
}

function switchBucket(name) {
  _activeBucket = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.bucket === name));
  document.querySelectorAll('.bucket-panel').forEach(p => p.classList.toggle('show', p.dataset.bucket === name));
  document.querySelectorAll('.action-template').forEach(a => {
    const match = a.dataset.bucket === name;
    a.classList.toggle('show', match);
  });
  applySearch();
}

function applySearch() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const visiblePanel = document.querySelector(`.bucket-panel[data-bucket="${_activeBucket}"]`);
  if (!visiblePanel) return;
  visiblePanel.querySelectorAll('tbody tr').forEach(tr => {
    if (!q) { tr.style.display = ''; return; }
    const kw = tr.dataset.kw || '';
    const c = tr.dataset.country || '';
    tr.style.display = (kw.includes(q) || c.includes(q)) ? '' : 'none';
  });
}

function attachSortHandlers() {
  document.querySelectorAll('table.data th').forEach(th => {
    th.addEventListener('click', () => {
      const table = th.closest('table');
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      if (!rows.length || rows[0].querySelector('td.empty')) return;
      const idx = Array.from(th.parentNode.children).indexOf(th);
      const type = th.dataset.type;
      const asc = !th.classList.contains('sort-asc');
      table.querySelectorAll('th').forEach(x => x.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(asc ? 'sort-asc' : 'sort-desc');
      rows.sort((a, b) => {
        const av = parseFloat(a.children[idx].innerText.replace(/[^\d.-]/g,'')) || 0;
        const bv = parseFloat(b.children[idx].innerText.replace(/[^\d.-]/g,'')) || 0;
        if (type === 'num') return asc ? av - bv : bv - av;
        return asc ? a.children[idx].innerText.localeCompare(b.children[idx].innerText) : b.children[idx].innerText.localeCompare(a.children[idx].innerText);
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}

async function load() {
  try {
    const r = await fetch('data/strategy.json?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _strategy = await r.json();

    // meta
    const total = (_strategy.stats && _strategy.stats.in_buckets) || 0;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('generatedAt').textContent = (_strategy.generated_at || '').replace('T', ' ').substring(0, 16);

    // legacy
    const lks = _strategy.legacy_keywords || [];
    document.getElementById('legacyCount').textContent = lks.length;
    document.getElementById('legacyNames').textContent = lks.map(l => l.zh || l.kw).join(' · ');

    renderSummary();
    renderTabs();
    renderPanels();
    attachSortHandlers();
    applySearch();
  } catch(e) {
    document.getElementById('panels').innerHTML =
      '<div style="padding:40px;text-align:center;color:#999">⚠️ 加载失败：' + e.message + '<br><br>请确认 <code>data/strategy.json</code> 存在</div>';
  }
}

document.getElementById('searchInput').addEventListener('input', applySearch);
load();
</script>

</body>
</html>
